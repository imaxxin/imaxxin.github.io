<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>文章目录</title>
  <style>
    body { max-width: 700px; margin: 40px auto; padding: 0 20px; font-family: sans-serif; }
    .article-list a { display: block; margin: 12px 0; font-size: 18px; color: #0066cc; }
    .page { margin-top: 30px; }
    .page button { padding: 8px 16px; margin-right: 10px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>阿信的Blog</h1>

  <div class="article-list">
    <a href="articles/迭代法回顾.html">迭代法回顾</a>
    <a href="articles/随机迭代方法对于线性系统.html">随机迭代方法对于线性系统</a>
    <a href="articles/随机扩展Kaczmarz算法.html">随机扩展Kaczmarz算法</a>
    <a href="articles/最速下降法和共轭梯度法.html">最速下降法和共轭梯度法</a>
    <a href="articles/坐标下降法.html">坐标下降法</a>
    <a href="articles/LSQR.html">LSQR</a>
    <a href="articles/PLSS.html">PLSS</a>
    <a href="articles/Sketch-and-Precondition.html">Sketch-and-Precondition</a>
  </div>

  <div class="page">
    <button onclick="prevPage()">上一页</button>
    <button onclick="nextPage()">下一页</button>
  </div>

  <script>
    let currentPage = 1
    const totalPages = 2
    const perPage = 5

    function showPage() {
      let items = document.querySelectorAll('.article-list a')
      items.forEach((el, i) => {
        el.style.display = 'none'
      })
      let start = (currentPage - 1) * perPage
      let end = start + perPage
      for (let i = start; i < end && i < items.length; i++) {
        items[i].style.display = 'block'
      }
    }

    function nextPage() {
      if (currentPage < totalPages) {
        currentPage++
        showPage()
      }
    }

    function prevPage() {
      if (currentPage > 1) {
        currentPage--
        showPage()
      }
    }

    showPage()
  </script>
</body>
</html>
